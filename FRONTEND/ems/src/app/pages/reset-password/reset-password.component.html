<div>
  <h3 class="auth-title">Choose New Password</h3>
  
  <div *ngIf="!isSubmitted()">
    <p class="auth-desc">
      Set a new password for your employee account.
    </p>

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm">
      <div class="form-group">
        <label class="form-label" for="employeeCode">Employee Code</label>
        <input type="text"
               id="employeeCode"
               name="employeeCode"
               class="form-control"
               [ngModel]="employeeCode()"
               (ngModelChange)="employeeCode.set($event)"
               required
               placeholder="Enter your EmployeeCode">
      </div>

      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input type="password"
               id="newPassword"
               name="newPassword"
               class="form-control"
               [ngModel]="newPassword()"
               (ngModelChange)="newPassword.set($event)"
               required
               placeholder="Enter your New Password">
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input type="password"
               id="confirmPassword"
               name="confirmPassword"
               class="form-control"
               [ngModel]="confirmPassword()"
               (ngModelChange)="confirmPassword.set($event)"
               required
               placeholder="Re Enter New Password">
        <div class="form-error" *ngIf="errorMessage()">
          {{ errorMessage() }}
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="resetForm.invalid">
        Reset Password
      </button>
    </form>
  </div>

  <div *ngIf="isSubmitted()" class="success-state">
    <span class="success-icon">✓</span>
    <h4>Password Updated</h4>
    <p class="success-desc">
      Your password has been successfully reset. You can now use your new password to sign in.
    </p>
  </div>

  <div class="auth-footer">
    <a routerLink="/login" class="back-link">Back to Sign In</a>
  </div>
</div>
