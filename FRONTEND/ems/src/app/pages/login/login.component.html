<form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
  <div class="login-brand-header">
    <h2>GlobalTech Solutions</h2>
    <p>Employee Management System</p>
  </div>

  <h3 class="login-title">{{ isInitMode() ? 'Initialize Admin Account' : 'Sign In' }}</h3>

  <p class="login-subtitle" *ngIf="isInitMode()">
    Configure the primary HR administrator account to initialize the system.
  </p>

  <div class="alert alert-danger" *ngIf="errorMessage()">
    {{ errorMessage() }}
  </div>

  <div class="alert alert-success" *ngIf="successMessage()">
    {{ successMessage() }}
  </div>

  <div class="form-group">
    <label class="form-label" for="employeeCode">Employee Code</label>
    <input type="text" id="employeeCode" name="employeeCode" class="form-control" [ngModel]="employeeCode()"
      (ngModelChange)="employeeCode.set($event)" required #codeField="ngModel" placeholder="Enter the employee code">
    <div class="form-error" *ngIf="codeField.touched && codeField.invalid">
      Employee code is required.
    </div>
  </div>

  <div class="form-group">
    <label class="form-label" for="password">Password</label>
    <input type="password" id="password" name="password" class="form-control" [ngModel]="password()"
      (ngModelChange)="password.set($event)" required #passwordField="ngModel" placeholder="enter your password">
    <div class="form-error" *ngIf="passwordField.touched && passwordField.invalid">
      Password is required.
    </div>
  </div>

  <button type="submit" class="btn btn-primary btn-block" [disabled]="loginForm.invalid || isLoading()">
    <span>{{ isInitMode() ? 'Initialize Admin Account' : 'Sign In' }}</span>
  </button>

  <div class="initialization-toggle" *ngIf="isInitMode()">
    <button type="button" class="btn-link-toggle" (click)="toggleInitMode()">
      Back to Sign In
    </button>
  </div>
</form>
