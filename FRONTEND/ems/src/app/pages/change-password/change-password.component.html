<div class="container" [class.reset-layout]="isResetMode()">
  <div class="action-bar" *ngIf="!isResetMode()">
    <h2 class="page-title">Change Password</h2>
  </div>

  <div class="card change-password-card">
    <h3 class="card-title card-header-underline">
      {{ isResetMode() ? 'Reset Password for ' + resetUser() : 'Update Security Credentials' }}
    </h3>

    <!-- Messages -->
    <div class="alert alert-success" *ngIf="successMessage()">
      {{ successMessage() }}
    </div>
    <div class="alert alert-danger" *ngIf="errorMessage()">
      {{ errorMessage() }}
    </div>

    <form (ngSubmit)="onSubmit()" #passwordForm="ngForm">
      <!-- Old Password (Hidden during forgot password reset) -->
      <div class="form-group" *ngIf="!isResetMode()">
        <label class="form-label" for="oldPassword">Old Password</label>
        <input type="password" 
               id="oldPassword" 
               name="oldPassword" 
               class="form-control" 
               [ngModel]="oldPassword()" 
               (ngModelChange)="oldPassword.set($event)" 
               required 
               placeholder="Enter your current password">
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input type="password" 
               id="newPassword" 
               name="newPassword" 
               class="form-control" 
               [ngModel]="newPassword()" 
               (ngModelChange)="newPassword.set($event)" 
               required 
               minlength="4"
               placeholder="Enter new password ">
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <input type="password" 
               id="confirmPassword" 
               name="confirmPassword" 
               class="form-control" 
               [ngModel]="confirmPassword()" 
               (ngModelChange)="confirmPassword.set($event)" 
               required 
               placeholder="Confirm your new password">
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary mr-2" *ngIf="isResetMode()" routerLink="/login">
          Back to Login
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="passwordForm.invalid || isLoading()">
          {{ isLoading() ? 'Saving...' : isResetMode() ? 'Reset Password' : 'Change Password' }}
        </button>
      </div>
    </form>
  </div>
</div>
